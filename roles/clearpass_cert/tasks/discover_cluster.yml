---
- name: Validate required vars for cluster UUID discovery
  ansible.builtin.assert:
    that:
      - clearpass_client_id | length > 0
      - clearpass_client_secret | length > 0
      - clearpass_api_path | length > 0
  run_once: true

- name: Authenticate to ClearPass OAuth
  ansible.builtin.uri:
    url: "{{ clearpass_base_url | default('https://' ~ inventory_hostname) }}{{ clearpass_token_path }}"
    method: POST
    body_format: json
    body:
      grant_type: client_credentials
      client_id: "{{ clearpass_client_id }}"
      client_secret: "{{ clearpass_client_secret }}"
    validate_certs: "{{ validate_certs | bool }}"
    status_code: 200
    return_content: true
    timeout: "{{ clearpass_request_timeout }}"
  register: clearpass_oauth
  no_log: true
  run_once: true

- name: Cache OAuth access token
  ansible.builtin.set_fact:
    clearpass_access_token: "{{ clearpass_oauth.json.access_token }}"
  no_log: true
  run_once: true

- name: Query cluster servers from ClearPass
  ansible.builtin.uri:
    url: "{{ clearpass_base_url | default('https://' ~ inventory_hostname) }}{{ clearpass_api_path }}{{ clearpass_cluster_server_endpoint }}"
    method: GET
    headers:
      Authorization: "Bearer {{ clearpass_access_token }}"
      Accept: application/json
    validate_certs: "{{ validate_certs | bool }}"
    status_code: 200
    return_content: true
    timeout: "{{ clearpass_request_timeout }}"
  register: clearpass_cluster_server_response
  no_log: true
  run_once: true

- name: Normalize cluster server response
  ansible.builtin.set_fact:
    clearpass_discovered_cluster_servers: >-
      {{
        clearpass_cluster_server_response.json['_embedded']['items']
        if (
          clearpass_cluster_server_response.json is mapping
          and '_embedded' in clearpass_cluster_server_response.json
          and clearpass_cluster_server_response.json['_embedded'] is mapping
          and 'items' in clearpass_cluster_server_response.json['_embedded']
        )
        else (
          clearpass_cluster_server_response.json['servers']
          if (
            clearpass_cluster_server_response.json is mapping
            and 'servers' in clearpass_cluster_server_response.json
          )
          else (
            clearpass_cluster_server_response.json['items']
            if (
              clearpass_cluster_server_response.json is mapping
              and 'items' in clearpass_cluster_server_response.json
            )
            else (
              clearpass_cluster_server_response.json
              if (clearpass_cluster_server_response.json is sequence and clearpass_cluster_server_response.json is not string)
              else []
            )
          )
        )
      }}
  run_once: true

- name: Validate cluster server response has usable records
  ansible.builtin.assert:
    that:
      - clearpass_discovered_cluster_servers | length > 0
    fail_msg: No cluster servers were returned from GET {{ clearpass_cluster_server_endpoint }}.
  run_once: true

- name: Build discovered server_uuid_map template
  ansible.builtin.set_fact:
    clearpass_discovered_server_uuid_map: "{{ (clearpass_discovered_server_uuid_map | default({})) | combine({ clearpass_discovery_key: [item.server_uuid] }) }}"
  vars:
    clearpass_discovery_key: "{{ item.fqdn | default(item.server_dns_name, true) | default(item.name, true) }}"
  loop: "{{ clearpass_discovered_cluster_servers }}"
  when:
    - item.server_uuid is defined
    - (item.server_uuid | string | length) > 0
    - clearpass_discovery_key is not none
    - (clearpass_discovery_key | string | length) > 0
  loop_control:
    label: "{{ clearpass_discovery_key | default('unknown') }}"
  run_once: true

- name: Ensure discovery output directory exists
  ansible.builtin.file:
    path: "{{ clearpass_cluster_discovery_output | dirname }}"
    state: directory
  delegate_to: localhost
  run_once: true

- name: Write cluster UUID discovery file
  ansible.builtin.copy:
    dest: "{{ clearpass_cluster_discovery_output }}"
    content: |
      # Generated by playbooks/discover_cluster_uuids.yml
      # Source host: {{ inventory_hostname }}
      # Endpoint: {{ clearpass_cluster_server_endpoint }}
      {{ {
        'discovered_server_uuid_map': (clearpass_discovered_server_uuid_map | default({}))
      } | to_nice_yaml(indent=2) }}
  delegate_to: localhost
  run_once: true

- name: Show where discovery output was written
  ansible.builtin.debug:
    msg: "Cluster UUID discovery written to {{ clearpass_cluster_discovery_output }}"
  run_once: true

